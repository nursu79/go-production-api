version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: go_api_postgres
    environment:
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: api_password
      POSTGRES_DB: api_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_user -d api_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go_production_api
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - DB_URL=postgres://api_user:api_password@db:5432/api_db?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
