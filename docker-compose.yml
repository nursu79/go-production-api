services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - APP_ENV=development
      - APP_PORT=8080
      - DB_URL=postgres://${DB_USER:-api_user}:${DB_PASSWORD:-api_password}@db:5432/${DB_NAME:-api_db}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-refresh_secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-api_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-api_password}
      POSTGRES_DB: ${DB_NAME:-api_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-api_user} -d ${DB_NAME:-api_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data


volumes:
  pgdata:
  redis_data:
